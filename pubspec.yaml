name: subtrack
description: Track and manage your subscriptions smartly.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # UI
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  fl_chart: ^0.66.0
  lottie: ^3.0.0
  # Notifications
  flutter_local_notifications: ^19.0.0
  # Storage
  shared_preferences: ^2.2.2
  timezone: ^0.10.0
  google_sign_in: ^6.2.1
  # Utils
  intl: ^0.19.0
  uuid: ^4.2.2
  url_launcher: ^6.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/logos/